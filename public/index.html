<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Code Web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #161b22;
      padding: 12px 20px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 18px; color: #58a6ff; }
    .header .model { font-size: 12px; color: #8b949e; background: #21262d; padding: 4px 8px; border-radius: 4px; }
    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .terminal-line { margin-bottom: 2px; }
    .terminal-line.user { color: #58a6ff; }
    .terminal-line.system { color: #8b949e; }
    .terminal-line.error { color: #f85149; }
    .input-container {
      background: #161b22;
      padding: 16px 20px;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-container textarea {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    .input-container textarea:focus { outline: none; border-color: #58a6ff; }
    .send-btn {
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .send-btn:hover { background: #2ea043; }
    .send-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #setup { padding: 40px 20px; max-width: 500px; margin: 0 auto; width: 100%; }
    #setup h2 { color: #58a6ff; margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #8b949e; }
    .form-group select, .form-group input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      padding: 12px;
      font-size: 14px;
    }
    .form-group select:focus, .form-group input:focus { outline: none; border-color: #58a6ff; }
    .start-btn {
      width: 100%;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 500;
      margin-top: 8px;
    }
    .start-btn:hover { background: #2ea043; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="setup">
    <h2>Free Code Web</h2>
    <div class="form-group">
      <label>API Provider</label>
      <select id="provider">
        <option value="openrouter">OpenRouter</option>
        <option value="anthropic">Anthropic</option>
        <option value="openai">OpenAI</option>
      </select>
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
    </div>
    <div class="form-group">
      <label>Model</label>
      <input type="text" id="model" value="nvidia/nemotron-3-ultra-550b-a55b:free" placeholder="model name">
    </div>
    <button class="start-btn" id="startBtn">开始使用</button>
  </div>

  <div id="app" class="hidden" style="flex:1;display:flex;flex-direction:column;">
    <div class="header">
      <h1>Free Code</h1>
      <span class="model" id="modelDisplay"></span>
    </div>
    <div class="terminal" id="terminal"></div>
    <div class="input-container">
      <textarea id="input" placeholder="输入命令..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    let ws = null;
    let sessionId = null;

    const setup = document.getElementById('setup');
    const app = document.getElementById('app');
    const terminal = document.getElementById('terminal');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const startBtn = document.getElementById('startBtn');

    startBtn.addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      const model = document.getElementById('model').value.trim();
      const provider = document.getElementById('provider').value;

      if (!apiKey) { alert('请输入 API Key'); return; }

      startBtn.disabled = true;
      startBtn.textContent = '连接中...';

      try {
        const res = await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey, model, provider })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        sessionId = data.sessionId;
        document.getElementById('modelDisplay').textContent = model;

        setup.classList.add('hidden');
        app.classList.remove('hidden');
        app.style.display = 'flex';

        connectWebSocket();
      } catch (e) {
        alert(e.message);
        startBtn.disabled = false;
        startBtn.textContent = '开始使用';
      }
    });

    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'init', sessionId }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'ready') {
          addLine('system', 'CLI 已启动，等待输入...');
        } else if (msg.type === 'output') {
          addLine('stdout', msg.data);
        } else if (msg.type === 'stderr') {
          addLine('error', msg.data);
        } else if (msg.type === 'exit') {
          if (msg.code !== 0) addLine('error', `错误 (code ${msg.code})`);
        } else if (msg.type === 'error') {
          addLine('error', `错误: ${msg.message}`);
        }
      };

      ws.onclose = () => {
        addLine('system', '连接已断开，正在重连...');
        setTimeout(connectWebSocket, 3000);
      };
    }

    function addLine(type, text) {
      const lines = text.split('\n');
      lines.forEach(line => {
        const div = document.createElement('div');
        div.className = `terminal-line ${type}`;
        div.textContent = line || ' ';
        terminal.appendChild(div);
      });
      terminal.scrollTop = terminal.scrollHeight;
    }

    function sendInput() {
      const text = input.value;
      if (!text && text !== '') return;

      if (text) {
        addLine('user', `$ ${text}`);
      }

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data: text }));
      }

      input.value = '';
      input.style.height = 'auto';
    }

    sendBtn.addEventListener('click', sendInput);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendInput();
      }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
